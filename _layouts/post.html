---
layout: default
---

<article class="post-container">
    <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <p class="post-meta">
            <time datetime="{{ page.date | date_to_xmlschema }}">
                {{ page.date | date: "%B %d, %Y" }}
            </time>
        </p>
    </header>

    <div class="post-content">
        {{ content }}
    </div>

    <div class="post-navigation">
        {% if page.next %}
            <a href="{{ page.next.url | relative_url }}" class="nav-next">← Previous</a>
        {% endif %}
        {% if page.previous %}
            <a href="{{ page.previous.url | relative_url }}" class="nav-prev">Next →</a>
        {% endif %}
        <a href="{{ '/' | relative_url }}" class="nav-back">Back to Home</a>
    </div>
</article>
