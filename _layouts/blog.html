<!DOCTYPE html>
<html lang="en">
{% include head.html %}
<body>
{% include navbar.html %}


<main class="content slide-up">
<h1>{{ page.title }}</h1>
<ul class="post-list">
{% for post in site.posts %}
<li>
<a href="{{ post.url }}" class="post-item fade-in">
<h2>{{ post.title }}</h2>
<p>{{ post.excerpt }}</p>
<span>{{ post.date | date: "%B %d, %Y" }}</span>
</a>
</li>
{% endfor %}
</ul>
</main>


{% include footer.html %}
</body>
</html>
